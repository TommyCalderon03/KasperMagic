version: '3.8'

services:
  interfaz-antivirus:
    build:
      context: ./interfaz-antivirus
      dockerfile: Dockerfile
    container_name: kasper-antivirus
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
    restart: unless-stopped
    networks:
      - kasper-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  kasper-network:
    driver: bridge